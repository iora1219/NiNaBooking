<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>備用預約入口 - 肩頸救贖</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@500&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #4361ee;
    --bg-color: #f0f2f5;
    --card-bg: #ffffff;
    --text-main: #2d3436;
    --slot-empty-bg: #e8f5e9;
    --slot-empty-text: #2e7d32;
    --slot-empty-border: #a5d6a7;
    --slot-full-bg: #ffebee;
    --slot-full-text: #c62828;
    --slot-full-border: #ef9a9a;
    --slot-locked-bg: #e9ecef;
  }
  body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; padding: 15px; background-color: var(--bg-color); color: var(--text-main); margin: 0; }
  
  .navbar {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card-bg); padding: 15px 20px; border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
    flex-wrap: wrap; gap: 15px;
  }
  .nav-title { font-size: 1.3rem; font-weight: 700; color: #333; display: flex; align-items: center; gap: 10px; }
  .nav-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  
  .status-pill {
    padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .pill-blue { background: #e3f2fd; color: #1565c0; }
  .pill-green { background: #e8f5e9; color: #2e7d32; }
  .pill-red { background: #ffebee; color: #c62828; }
  
  .search-wrapper { position: relative; flex-grow: 1; }
  .search-wrapper input {
    padding: 10px 15px 10px 35px; border: 2px solid #e0e0e0;
    border-radius: 25px; outline: none; transition: all 0.3s; width: 100%; max-width: 200px; font-size: 14px;
    box-sizing: border-box;
  }
  .search-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999; font-size: 14px; }
  
  .table-card {
    background: var(--card-bg); border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    overflow: hidden; padding: 10px;
  }
  .table-scroll { overflow-x: auto; max-height: 75vh; -webkit-overflow-scrolling: touch; } 
  table { width: 100%; border-collapse: separate; border-spacing: 6px; }
  th {
    background: #34495e; color: #fff; padding: 12px; text-align: center;
    font-weight: 600; border-radius: 6px;
    position: sticky; top: 0; z-index: 5;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    white-space: nowrap;
  }
  .time-col {
    background: #f8f9fa; color: #333; font-weight: 700; font-size: 0.85rem;
    padding: 0 10px; border-radius: 6px; border: 1px solid #dee2e6;
    white-space: nowrap;
    display: flex; align-items: center; justify-content: center; height: 50px;
  }
  .slot {
    height: 50px; min-width: 90px;
    font-size: 0.95rem; font-weight: 500;
    border-radius: 8px; border: 2px solid transparent; 
    cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 2px 0 rgba(0,0,0,0.05);
    display: flex; align-items: center; justify-content: center; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .slot:active { transform: scale(0.95); }
  
  .empty { background-color: var(--slot-empty-bg); color: var(--slot-empty-text); border-color: var(--slot-empty-border); }
  .full { background-color: var(--slot-full-bg); color: var(--slot-full-text); border-color: var(--slot-full-border); font-weight: 700; }
  .locked-sys {
    background-color: var(--slot-locked-bg); color: #adb5bd; border-color: #dee2e6;
    cursor: not-allowed;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.03) 5px, rgba(0,0,0,0.03) 10px);
    box-shadow: none;
  }
  .locked-sys::after { content: "🔒"; font-size: 0.8rem; opacity: 0.4; margin-left: 5px; }
  
  .highlight {
    background-color: #fff9c4 !important; color: #f57f17 !important; border-color: #fbc02d !important;
    box-shadow: 0 0 15px #fbc02d; z-index: 10;
    animation: pop 0.5s ease-in-out infinite alternate;
  }
  @keyframes pop { from { transform: scale(1); } to { transform: scale(1.05); } }
  
  .admin-mode .full { cursor: text; border-style: dashed; border-width: 2px; }
  
  .btn {
    padding: 8px 16px; border: none; border-radius: 20px;
    font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid #ccc; color: #666; }
  .btn-active { background: var(--primary); color: #fff; border-color: var(--primary); }
  
  #toast {
    visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center;
    border-radius: 50px; padding: 14px; position: fixed; 
    z-index: 20000; left: 50%; bottom: 30px;
    transform: translateX(-50%) translateY(20px); font-size: 14px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  }
  #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
  
  #loading { 
    position: fixed; top:0; left:0; width:100%; height:100%; 
    background: rgba(255,255,255,0.95); z-index: 2000;
    display: flex; justify-content: center; align-items: center;
    flex-direction: column; color: #4361ee; font-weight: bold;
  }
  
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); display: none; 
    justify-content: center; align-items: center; z-index: 9999;
    backdrop-filter: blur(3px);
  }
  .modal-box {
    background: #fff; padding: 25px; border-radius: 16px;
    width: 90%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center; border: 1px solid #e0e0e0;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #333; }
  .modal-input {
    width: 100%; padding: 12px; margin-bottom: 20px;
    border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; text-align: center;
    box-sizing: border-box; outline: none; transition: 0.2s;
  }
  .modal-input:focus { border-color: var(--primary); }
  .modal-btns { display: flex; justify-content: space-between; gap: 10px; }
  .modal-btns button { width: 50%; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; }
  .btn-confirm { background: var(--primary); color: white; }
  .btn-cancel { background: #f0f2f5; color: #666; }
</style>
</head>
<body>

<div id="loading">
  <div style="font-size: 2rem; margin-bottom: 10px;">⏳</div>
  <div>正在連線至救贖機台...</div>
</div>

<div class="navbar">
  <div class="nav-title">
    📅 備用預約入口
    <button id="admin-btn" class="btn btn-outline" onclick="openAdminModal()">管理員</button>
  </div>
  
  <div class="nav-controls">
    <div id="current-date" class="status-pill pill-blue">-- 年 -- 月</div>
    <div id="system-status" class="status-pill pill-red">載入中...</div>

    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="number" pattern="\d*" id="searchInput" placeholder="搜尋工號..." onkeyup="searchName()">
    </div>
  </div>
</div>

<div class="table-card">
  <div class="table-scroll">
    <table id="booking-table">
      <thead><tr id="headRow"><th>時段</th></tr></thead>
      <tbody id="bodyRows"></tbody>
    </table>
  </div>
</div>

<div id="toast">提示訊息</div>

<div id="nameModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">請輸入工號</div>
    <input type="number" pattern="\d*" id="nameInput" class="modal-input" placeholder="例如：1234567">
    <div style="font-size: 12px; color: #999; margin-top: -10px; margin-bottom: 15px;">(清空並確定 = 取消預約)</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('nameModal')">返回</button>
      <button class="btn-confirm" onclick="submitName()">確定</button>
    </div>
  </div>
</div>

<div id="adminModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">管理員登入</div>
    <input type="password" id="adminInput" class="modal-input" placeholder="請輸入安全密碼">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('adminModal')">取消</button>
      <button class="btn-confirm" onclick="submitAdmin()">登入</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// ★ 防護機制 1：禁用滑鼠右鍵與常見開發者快捷鍵 (防君子)
// ==========================================
document.addEventListener('contextmenu', event => {
    event.preventDefault();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || 
       (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
       (e.ctrlKey && e.key === 'U')) {
        e.preventDefault();
    }
});

// ==========================================
// ★ 防護機制 2：使用 IIFE (立即執行函式) 隱藏變數 (防駭客)
// ==========================================
(function() {
    const firebaseConfig = {
      apiKey: "AIzaSyDMcElmgfe41frKNQ4WdZtuK_t6vz0KyPI", 
      authDomain: "booking-2868f.firebaseapp.com",
      databaseURL: "https://booking-2868f-default-rtdb.firebaseio.com", 
      projectId: "booking-2868f",
      storageBucket: "booking-2868f.appspot.com",
      messagingSenderId: "508038962872",
      appId: "1:508038962872:web:d4776dc98bb3706e905e4d",
      measurementId: "G-XEB4SCVVG2"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const appCheck = firebase.appCheck();
    appCheck.activate(
      '6Ld8VWEsAAAAAPqzsqVsDPHcJV9N3w5vBmLUNYLJ', 
      true
    );

    const db = firebase.database();

    const weekdayName = n => ["(日)","(一)","(二)","(三)","(四)","(五)","(六)"][n];
    const defaultTimeslots = ["13:00~13:30","13:35~14:05","14:10~14:40","14:45~15:15","15:20~15:50","15:55~16:25","16:30~17:00"];

    let currentState = { data: [], timeslots: [], adminPassword: null };
    let editable = true; 
    let isAdmin = false;
    let targetRow = null;
    let targetCol = null;
    let targetCurrentVal = "";

    function verify(input) {
        if(!currentState.adminPassword) return false;
        let hash = 0;
        let str = String(input).trim();
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        let inputHash = "SEC" + hash;
        return inputHash === String(currentState.adminPassword).trim();
    }

    db.ref('/').on('value', (snapshot) => {
      document.getElementById("loading").style.display = "none";
      const val = snapshot.val();

      if (val) {
        currentState = val;
        if (!currentState.data) currentState.data = [];
        if (!currentState.timeslots) currentState.timeslots = [...defaultTimeslots];
        if (typeof currentState.editable !== 'undefined') editable = currentState.editable;
            
        if (!currentState.year) currentState.year = 2026;
        if (currentState.month === undefined) currentState.month = 1;
        if (!currentState.C1) currentState.C1 = 1;
        if (!currentState.C2) currentState.C2 = 4;
        
        normalizeDataArray();
        updateUI();
        renderTable();
        searchName();
      } else {
        showToast("⚠️ 目前資料庫為空");
      }
    });

    function normalizeDataArray() {
        if (currentState.data && !Array.isArray(currentState.data)) {
            let maxRow = Object.keys(currentState.data).reduce((a, b) => Math.max(parseInt(a), parseInt(b)), 0);
            let arr = [];
            for (let i = 0; i <= maxRow; i++) {
                let rowObj = currentState.data[i];
                if (rowObj) {
                    if (Array.isArray(rowObj)) { arr[i] = rowObj; } 
                    else {
                        let maxCol = Object.keys(rowObj).reduce((a, b) => Math.max(parseInt(a), parseInt(b)), 0);
                        let rowArr = [];
                        for(let j=0; j<=maxCol; j++) rowArr[j] = rowObj[j] || "";
                        arr[i] = rowArr;
                    }
                } else { arr[i] = []; }
            }
            currentState.data = arr;
        }
    }

    function updateUI() {
        const y = currentState.year || "--";
        const m = currentState.month || "--";
        const w1 = typeof currentState.C1 !== 'undefined' ? weekdayName(currentState.C1) : "?";
        const w2 = typeof currentState.C2 !== 'undefined' ? weekdayName(currentState.C2) : "?";
        
        document.getElementById("current-date").innerHTML = `${y} 年 ${m} 月 &nbsp; <b>${w1} / ${w2}</b>`;
        
        const statusSpan = document.getElementById("system-status");
        statusSpan.className = "status-pill";
        
        if(isAdmin) {
            statusSpan.classList.add("pill-blue");
            statusSpan.textContent = "管理員模式";
            document.body.classList.add('admin-mode');
            document.getElementById("admin-btn").classList.add("btn-active");
        } else {
            document.body.classList.remove('admin-mode');
            document.getElementById("admin-btn").classList.remove("btn-active");
            if(editable) {
                statusSpan.classList.add("pill-green");
                statusSpan.textContent = "開放預約中";
            } else {
                statusSpan.classList.add("pill-red");
                statusSpan.textContent = "系統已鎖定";
            }
        }
    }

    function generateDates(year, month, C1, C2) { 
        const list = []; 
        const y = Number(year);
        const m = Number(month);
        if (!y || !m) return []; 

        let d = new Date(y, m - 1, 1); 
        while (d.getMonth() === (m - 1)) { 
            if (d.getDay() === Number(C1) || d.getDay() === Number(C2)) 
                list.push(`${m}/${d.getDate()} ${weekdayName(d.getDay())}`); 
            d.setDate(d.getDate() + 1); 
        } 
        return list; 
    }

    function renderTable() {
        if (!currentState.year) return;
        const dates = generateDates(currentState.year, currentState.month, currentState.C1, currentState.C2);
        const head = document.getElementById("headRow"); 
        const body = document.getElementById("bodyRows");
        
        head.innerHTML = "<th>時段</th>"; 
        dates.forEach(dt => { 
            const th = document.createElement("th"); 
            th.textContent = dt; 
            head.appendChild(th); 
        });

        body.innerHTML = "";
        const slots = currentState.timeslots || defaultTimeslots;
        
        slots.forEach((slot, r) => {
            const tr = document.createElement("tr"); 
            
            const tdSlot = document.createElement("td"); 
            const divTime = document.createElement("div");
            divTime.className = "time-col";
            divTime.textContent = slot;
            tdSlot.appendChild(divTime);
            tr.appendChild(tdSlot);
            
            dates.forEach((_, c) => {
                const td = document.createElement("td"); 
                const rowData = currentState.data[r] || [];
                const val = rowData[c] || "";
                
                const div = document.createElement("div");
                div.className = "slot";
                div.textContent = val;
                div.dataset.name = val; 

                if (val !== "") {
                    div.classList.add("full"); 
                } else if (!editable && !isAdmin) { 
                    div.classList.add("locked-sys"); 
                } else {
                    div.classList.add("empty"); 
                }
                
                div.onclick = () => openNameModal(r, c, val);
                
                td.appendChild(div);
                tr.appendChild(td);
            }); 
            body.appendChild(tr);
        });
    }

    function openNameModal(r, c, val) {
        if (!editable && !isAdmin && val === "") {
            showToast("⛔ 系統目前已鎖定");
            return;
        }
        if (val !== "" && !isAdmin) {
            showToast("⚠️ 此時段已被預約！");
            return;
        }

        targetRow = r;
        targetCol = c;
        targetCurrentVal = val;
        
        const input = document.getElementById('nameInput');
        input.value = isAdmin ? val : ""; 
        
        document.getElementById('nameModal').style.display = 'flex';
        input.focus();
    }

    function submitName() {
        const input = document.getElementById('nameInput');
        const newName = input.value.trim();

        if (newName === targetCurrentVal) {
            closeModal('nameModal');
            return;
        }
        
        if (newName !== "" && !/^\d{7}$/.test(newName)) {
            showToast("格式錯誤！請輸入 7 位數工號");
            return;
        }

        if (newName !== "" && !isAdmin) {
            let count = 0;
            if (currentState.data) {
                currentState.data.forEach(row => {
                    if(row) row.forEach(v => { if (String(v || "").trim() === newName) count++; });
                });
            }
            if (count >= 2) {
                showToast(`🚫 ${newName} 已達預約上限 (2次)！`);
                return; 
            }
        }

        const cellRef = db.ref('data/' + targetRow + '/' + targetCol);
        cellRef.transaction((serverVal) => {
            if (isAdmin) return newName; 
            if (newName === "") return ""; 
            if (serverVal && serverVal !== "") { return; } 
            return newName;
        }, (error, committed, snapshot) => {
            if (error) { showToast("❌ 寫入錯誤"); } 
            else if (!committed) {
                const actualName = snapshot.val();
                showToast(`⚠️ 慢了一步！被 [ ${actualName || '其他人'} ] 搶走了`);
            } else {
                showToast(newName === "" ? "✅ 已取消預約" : "✅ 預約成功");
            }
        });

        closeModal('nameModal');
    }

    function openAdminModal() {
        if (isAdmin) {
            showToast("已處於管理員模式");
            return;
        }
        document.getElementById('adminInput').value = "";
        document.getElementById('adminModal').style.display = 'flex';
        document.getElementById('adminInput').focus();
    }

    function submitAdmin() {
        const pwd = document.getElementById('adminInput').value;
        if (verify(pwd)) {
            isAdmin = true;
            showToast("🔓 管理員登入成功");
            updateUI();
            renderTable();
            closeModal('adminModal');
        } else {
            showToast("❌ 密碼錯誤");
            document.getElementById('adminInput').value = "";
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function searchName() {
        const input = document.getElementById('searchInput').value.trim().toLowerCase();
        const cells = document.querySelectorAll('.slot');
        cells.forEach(cell => {
            const name = (cell.dataset.name || "").toLowerCase();
            if (input && name.includes(input)) {
                cell.classList.add('highlight');
            } else {
                cell.classList.remove('highlight');
            }
        });
    }

    function showToast(message) {
        const t = document.getElementById("toast");
        t.textContent = message;
        t.className = "show";
        setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
    }

    document.getElementById('nameInput').addEventListener("keypress", (e) => { if(e.key==="Enter") submitName(); });
    document.getElementById('adminInput').addEventListener("keypress", (e) => { if(e.key==="Enter") submitAdmin(); });

    // 將會被 HTML 屬性 (onclick, onkeyup) 呼叫到的函式，強制暴露到全域 window 中
    window.openAdminModal = openAdminModal;
    window.closeModal = closeModal;
    window.submitName = submitName;
    window.submitAdmin = submitAdmin;
    window.searchName = searchName;

})();
</script>
</body>
</html>
